<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>図面メモ議事録</title>
  <link rel="stylesheet" href="./style.css" />
  <link rel="manifest" href="./manifest.json" />
</head>
<body>
  <header class="app-header">
    <div>
      <h1>図面メモ議事録</h1>
      <p>iPad Safari + GitHub Pages + Gemini API</p>
    </div>
    <div class="header-actions">
      <button id="saveProjectBtn" class="secondary">案件保存</button>
      <button id="exportWordBtn" class="primary">Word出力</button>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <section class="panel">
        <h2>案件</h2>
        <button id="newProjectBtn" class="full">＋ 新規案件</button>
        <div id="projectList" class="project-list"></div>
      </section>

      <section class="panel">
        <h2>AI設定</h2>
        <label class="file-button">
          gemini_api_key.txt を読み込む
          <input id="keyFileInput" type="file" accept=".txt,text/plain" />
        </label>
        <div class="check-row">
          <input id="saveKeysCheck" type="checkbox" />
          <label for="saveKeysCheck">このiPadに保存する</label>
        </div>
        <div class="check-row">
          <input id="discardKeysCheck" type="checkbox" checked />
          <label for="discardKeysCheck">読み取り後にキーを破棄する</label>
        </div>
        <p id="keyStatus" class="status">読み込み済みキー：0件</p>
        <button id="testGeminiBtn" class="secondary full">接続テスト</button>
        <button id="clearKeysBtn" class="danger-outline full">保存キー削除</button>
      </section>

      <section class="panel">
        <h2>プロンプト</h2>
        <label class="file-button">
          prompt.txt を読み込む
          <input id="promptFileInput" type="file" accept=".txt,text/plain" />
        </label>
        <textarea id="promptText" rows="12"></textarea>
      </section>
    </aside>

    <section class="content">
      <section class="panel">
        <h2>案件情報</h2>
        <div class="form-grid">
          <label>案件名<input id="projectName" placeholder="例：京都御苑" /></label>
          <label>住戸番号<input id="unitNo" placeholder="例：402" /></label>
          <label>打合せ日<input id="meetingDate" type="date" /></label>
          <label>打合せ相手<input id="clientName" placeholder="例：〇〇様" /></label>
          <label class="wide">出席者<input id="attendees" placeholder="例：施主様、長谷工様、カノン眞鍋" /></label>
          <label class="wide">備考<textarea id="projectNote" rows="2" placeholder="任意"></textarea></label>
        </div>
      </section>

      <section class="panel">
        <div class="panel-title-row">
          <h2>図面・手書き画像</h2>
          <span id="imageCount" class="badge">0枚</span>
        </div>

        <div class="button-row">
          <label class="file-button strong">
            写真/ファイルから選択
            <input id="imageFileInput" type="file" accept="image/*,.pdf" multiple />
          </label>
          <label class="file-button strong">
            カメラで撮影
            <input id="cameraFileInput" type="file" accept="image/*" capture="environment" />
          </label>
          <button id="startCameraBtn" class="secondary">カメラプレビュー</button>
          <button id="captureCameraBtn" class="secondary" disabled>撮影</button>
          <button id="stopCameraBtn" class="secondary" disabled>停止</button>
        </div>

        <video id="cameraPreview" playsinline autoplay muted class="camera-preview hidden"></video>
        <canvas id="captureCanvas" class="hidden"></canvas>
        <div id="imageGallery" class="image-gallery"></div>
      </section>

      <section class="panel">
        <div class="panel-title-row">
          <h2>AI読み取り</h2>
          <span id="readStatus" class="badge neutral">未読取</span>
        </div>
        <div class="form-grid small">
          <label>Geminiモデル
            <input id="modelName" value="gemini-1.5-flash-latest" />
          </label>
          <label>読取モード
            <select id="readMode">
              <option value="standard">標準</option>
              <option value="high_precision">高精度</option>
              <option value="line_focus">引き出し線重視</option>
              <option value="handwriting_focus">手書き重視</option>
            </select>
          </label>
        </div>
        <div class="button-row">
          <button id="readGeminiBtn" class="primary">Geminiで読み取り</button>
          <button id="insertSampleBtn" class="secondary">試験データ</button>
          <button id="exportJsonBtn" class="secondary">JSON書き出し</button>
        </div>
        <pre id="logBox" class="log"></pre>
      </section>

      <section class="panel result-panel">
        <div class="panel-title-row">
          <h2>読み取り候補・修正</h2>
          <div class="stats" id="resultStats">0件</div>
        </div>
        <div class="button-row">
          <button id="addItemBtn" class="secondary">＋ 行追加</button>
          <button id="showAllBtn" class="secondary">全件</button>
          <button id="showNeedsCheckBtn" class="secondary">要確認のみ</button>
        </div>
        <div id="itemsContainer" class="items-container"></div>
      </section>
    </section>
  </main>

  <template id="itemCardTemplate">
    <article class="item-card">
      <div class="item-head">
        <strong class="item-title"></strong>
        <button class="delete-item danger-outline">削除</button>
      </div>
      <div class="item-grid">
        <label>部屋<input class="field-room" /></label>
        <label>対象<input class="field-target" /></label>
        <label>区分
          <select class="field-category">
            <option>追加</option>
            <option>変更</option>
            <option>確認</option>
            <option>保留</option>
            <option>削除</option>
            <option>その他</option>
          </select>
        </label>
        <label>状態
          <select class="field-status">
            <option>確認済</option>
            <option>要確認</option>
            <option>要見積</option>
            <option>保留</option>
            <option>未分類</option>
          </select>
        </label>
        <label>信頼度
          <select class="field-confidence">
            <option>高</option>
            <option>中</option>
            <option>低</option>
          </select>
        </label>
        <label class="wide">内容<textarea class="field-content" rows="2"></textarea></label>
        <label class="wide">AI判断理由/備考<textarea class="field-reason" rows="2"></textarea></label>
      </div>
    </article>
  </template>

  <script src="./app.js"></script>
</body>
</html>
